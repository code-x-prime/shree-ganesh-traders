name: 🚀 Deploy Shree Ganesh Traders

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to VPS via SSH 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "📥 Navigating to project directory..."
            cd /root/shree-ganesh-traders

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🔨 Building Next.js..."
            # Using increased memory for build to prevent crashes
            NODE_OPTIONS="--max-old-space-size=2048" npm run build

            echo "🔄 Restarting PM2 (zero downtime)..."
            # This will reload the app if already running, or start it if it's the first time
            pm2 reload shree-ganesh-traders --update-env || pm2 start ecosystem.config.js

            echo "✅ Deployment Done on Port 7002!"
